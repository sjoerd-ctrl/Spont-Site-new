<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spont Sports Bar — Product Specs + Image Prompts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&amp;family=Outfit:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e14;--bg-elev:#131822;--bg-card:#171d28;--bg-sub:#0f131c;--border:#232a38;--border-hot:#2d3648;--text:#e8ecf3;--text-dim:#8b94a7;--text-faint:#5b6478;--accent:#ffa726;--accent-2:#ff7043;--accent-glow:#ffa72633;--success:#4ade80;--info:#60a5fa}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);background-image:radial-gradient(circle at 20% 0%,#ffa72612 0%,transparent 50%),radial-gradient(circle at 80% 100%,#ff704312 0%,transparent 50%);background-attachment:fixed;color:var(--text);min-height:100vh;line-height:1.5;padding:32px 24px 100px}
.wrap{max-width:1400px;margin:0 auto}
header{margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:8px}
h1{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,44px);font-weight:800;line-height:1.05;letter-spacing:-.02em;margin-bottom:10px}
h1 .accent{color:var(--accent)}.subtitle{color:var(--text-dim);max-width:820px;font-size:15px}
.stats{display:flex;gap:24px;margin-top:16px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim)}.stats b{color:var(--text);font-weight:500}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.search{flex:1;min-width:240px;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:inherit;font-size:14px;transition:border-color .15s,box-shadow .15s}
.search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}.search::placeholder{color:var(--text-faint)}
.progress-pill{background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:10px}
.progress-pill .num{color:var(--text);font-weight:500}.progress-bar{width:80px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .3s ease;width:0%}
.clear-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:8px;padding:10px 14px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s}
.clear-btn:hover{border-color:var(--accent);color:var(--accent)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;padding-bottom:22px;border-bottom:1px solid var(--border)}
.chip{background:var(--bg-elev);border:1px solid var(--border);color:var(--text-dim);border-radius:999px;padding:7px 14px;font-family:inherit;font-size:13px;cursor:pointer;transition:all .15s;user-select:none}
.chip:hover{color:var(--text);border-color:var(--border-hot)}.chip.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:500}
.cat-section{margin-bottom:36px}.cat-header{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.cat-dot{width:10px;height:10px;border-radius:2px}.cat-title{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:600;letter-spacing:-.01em}
.cat-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);margin-left:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:border-color .15s;position:relative}
.card:hover{border-color:var(--border-hot)}.card.done{opacity:.55;border-color:var(--success)}
.card.done::before{content:"OK";position:absolute;top:12px;right:14px;color:var(--success);font-weight:600;font-size:11px;font-family:'JetBrains Mono',monospace}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px;line-height:1.25;flex:1}
.card-price{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);font-weight:500;background:var(--accent-glow);padding:3px 8px;border-radius:4px;white-space:nowrap}
.meta-row{display:flex;flex-wrap:wrap;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px}
.meta-pill{background:var(--bg-sub);border:1px solid var(--border);color:var(--text-dim);padding:3px 7px;border-radius:4px}
.meta-pill.warn{color:var(--accent);border-color:var(--accent);background:var(--accent-glow)}.meta-pill.allerg{color:var(--accent-2);border-color:var(--accent-2)}
.card-desc{font-size:12px;color:var(--text-dim);font-style:italic;line-height:1.4}
.expand-row{display:flex;gap:6px;align-items:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);cursor:pointer;user-select:none;padding:4px 0;transition:color .15s}
.expand-row:hover{color:var(--text)}.expand-row .caret{transition:transform .2s;display:inline-block}.expand-row.open .caret{transform:rotate(90deg)}
.full-spec{display:none;background:var(--bg-sub);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.55;color:var(--text-dim)}
.full-spec.open{display:block}.full-spec .row{display:grid;grid-template-columns:130px 1fr;gap:8px;padding:3px 0}
.full-spec .row+.row{border-top:1px dashed var(--border);margin-top:2px;padding-top:5px}
.full-spec .lbl{color:var(--text-faint);text-transform:uppercase;font-size:9.5px;letter-spacing:.1em}.full-spec .val{color:var(--text);word-break:break-word}.full-spec .val.empty{color:var(--text-faint);font-style:italic}
.filename{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint);word-break:break-all}
.prompt-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.55;color:var(--text-dim);max-height:110px;overflow-y:auto;resize:none;width:100%}
.prompt-box::-webkit-scrollbar{width:4px}.prompt-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.actions{display:grid;grid-template-columns:1fr 1fr auto;gap:6px}
.btn{background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:9px 10px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn:hover{background:#ffb74d}.btn.copied{background:var(--success)}.btn.alt{background:var(--info)}.btn.alt:hover{background:#93c5fd}.btn.alt.copied{background:var(--success)}
.btn-sec{background:transparent;color:var(--text-dim);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s}
.btn-sec:hover{color:var(--text);border-color:var(--border-hot)}.btn-sec.active{color:var(--success);border-color:var(--success)}
.btn-full{background:transparent;color:var(--accent);border:1px dashed var(--accent);border-radius:8px;padding:8px 12px;width:100%;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s}
.btn-full:hover{background:var(--accent-glow)}.btn-full.copied{color:var(--success);border-color:var(--success);border-style:solid}
.no-results{text-align:center;padding:60px 20px;color:var(--text-faint)}
.helper-tag{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg-elev);border:1px solid var(--border-hot);border-radius:999px;padding:8px 16px;display:flex;gap:12px;align-items:center;font-size:12px;color:var(--text-dim);box-shadow:0 8px 32px rgba(0,0,0,.4);backdrop-filter:blur(10px);max-width:90vw;flex-wrap:wrap;justify-content:center}
.helper-tag kbd{background:var(--bg);border:1px solid var(--border-hot);border-radius:4px;padding:2px 6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">SPONT · NRA CHICAGO DEMO · CLAUDE CHROME READY</div>
    <h1>Sports Bar <span class="accent">Product Specs</span></h1>
    <p class="subtitle">140 producten met volledige Enzo backoffice data + image prompts.</p>
    <div class="stats">
      <span><b id="totalCount">0</b> producten</span>
      <span><b id="catCount">0</b> categorieen</span>
      <span><b id="doneCount">0</b> klaar</span>
    </div>
  </header>
  <div class="controls">
    <input type="text" id="search" class="search" placeholder="Zoek op productnaam, omschrijving, ingredient...">
    <div class="progress-pill"><span><span class="num" id="progressText">0/140</span></span><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div>
    <button class="clear-btn" id="expandAll">Alles uitklappen</button>
    <button class="clear-btn" id="resetDone">Reset progress</button>
  </div>
  <div class="filters" id="filters"></div>
  <div id="content"><div class="no-results">Laden...</div></div>
</div>
<div class="helper-tag">
  <span>Workflow:</span><kbd>Image prompt</kbd><span>&#8594; image-gen</span><kbd>Product spec</kbd><span>&#8594; Claude Chrome</span><kbd>Full bundle</kbd><span>&#8594; end-to-end</span>
</div>
<script>
let ITEMS=[];
const CATS=["Starters","Wings","Burgers","Sandwiches","Big Plates","Pizza","Salads","Sides","Kids","Desserts","Draft Beer","Bottled Beer","Cocktails","Wine","Spirits & Shots","Non-Alcoholic","Combo Deals"];
const STORAGE_KEY='spont_prompts_done_v2';
let done=new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'));
let activeFilter='All',searchTerm='',allExpanded=false;
const expandedCards=new Set(),catColor={};
const filtersEl=document.getElementById('filters'),contentEl=document.getElementById('content');
['All',...CATS].forEach(c=>{const ch=document.createElement('div');ch.className='chip'+(c==='All'?' active':'');ch.textContent=c;ch.onclick=()=>{activeFilter=c;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));ch.classList.add('active');render()};filtersEl.appendChild(ch)});
function yn(v){return v==='Y'?'Yes':v==='N'?'No':v}
function escapeHTML(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function buildProductSpec(i){const o=v=>v||'(none)';return'=== SPONT PRODUCT SPEC ===\nName: '+i.name+'\nDescription: '+o(i.description)+'\nCategory: '+i.category+'\nColor: '+i.color+'\n\n--- Pricing ---\nTax Group: '+i.taxGroup+'\nPrice (Excl. VAT): $'+i.priceExcl+'\nPrice (Incl. VAT): $'+i.priceIncl+'\nCost Price: $'+i.costPrice+'\nVAT %: '+i.vat+'\n\n--- Display ---\nDial Pad: '+yn(i.dialPad)+'\nDynamic: '+yn(i.dynamic)+'\nProduction Hidden: '+yn(i.productionHidden)+'\nAsk Quantity: '+yn(i.askQuantity)+'\n\n--- Nutrition & Tags ---\nCalorie Count: '+i.calories+'\nHas Alcohol: '+yn(i.hasAlcohol)+'\nTags: '+o(i.tags)+'\nIngredients: '+o(i.ingredients)+'\nAllergies: '+o(i.allergies)+'\nDietary: '+o(i.dietary)+'\n\n--- Image ---\nFilename: '+i.filename+'\nPrompt: '+i.prompt+'\n=== END SPEC ==='}
function buildFullBundle(i){return'# Spont product\n\n## STEP 1 — Image\nPrompt:\n'+i.prompt+'\nSave as: '+i.filename+'\n\n## STEP 2 — Create in Enzo\n'+buildProductSpec(i)+'\n\n## STEP 3 — Upload image, save.\n## STEP 4 — Verify.'}
function matchesSearch(i){if(!searchTerm)return true;const s=searchTerm.toLowerCase();return['name','description','category','tags','ingredients','allergies','dietary','prompt'].some(k=>(i[k]||'').toLowerCase().includes(s))}
function specRow(l,v){const e=!v||v==='';return'<div class="row"><div class="lbl">'+l+'</div><div class="val '+(e?'empty':'')+'">'+( e?'(empty)':escapeHTML(String(v)))+'</div></div>'}
function makeCard(item){const card=document.createElement('div');card.className='card'+(done.has(item.name)?' done':'');const isOpen=expandedCards.has(item.name)||allExpanded;
card.innerHTML='<div class="card-top"><div class="card-name">'+escapeHTML(item.name)+'</div><div class="card-price">$'+item.priceIncl+'</div></div><div class="meta-row"><div class="meta-pill" style="border-color:'+item.color+';color:'+item.color+'">'+escapeHTML(item.category)+'</div><div class="meta-pill">'+escapeHTML(item.taxGroup)+'</div><div class="meta-pill">'+item.calories+' kcal</div>'+(item.hasAlcohol==='Y'?'<div class="meta-pill warn">alcohol</div>':'')+(item.dietary?'<div class="meta-pill">'+escapeHTML(item.dietary)+'</div>':'')+(item.allergies?'<div class="meta-pill allerg">! '+escapeHTML(item.allergies)+'</div>':'')+'</div><div class="card-desc">'+escapeHTML(item.description||'—')+'</div><div class="expand-row '+(isOpen?'open':'')+'"><span class="caret">▶</span><span>Spec '+(isOpen?'verbergen':'tonen')+'</span></div><div class="full-spec '+(isOpen?'open':'')+'">'+ specRow('Price Excl.','$'+item.priceExcl)+specRow('Cost','$'+item.costPrice)+specRow('VAT %',item.vat)+specRow('Tags',item.tags)+specRow('Ingredients',item.ingredients)+specRow('Allergies',item.allergies)+specRow('Dietary',item.dietary)+'</div><div class="filename">file: '+item.filename+'</div><textarea class="prompt-box" readonly>'+escapeHTML(item.prompt)+'</textarea><div class="actions"><button class="btn" data-action="prompt">Image prompt</button><button class="btn alt" data-action="spec">Product spec</button><button class="btn-sec '+(done.has(item.name)?'active':'')+'" data-action="done">'+(done.has(item.name)?'OK':'mark')+'</button></div><button class="btn-full" data-action="bundle">Copy full bundle</button>';
card.querySelector('.expand-row').onclick=()=>{expandedCards.has(item.name)?expandedCards.delete(item.name):expandedCards.add(item.name);render()};
card.querySelectorAll('button').forEach(btn=>{btn.onclick=async()=>{const a=btn.dataset.action;if(a==='done'){done.has(item.name)?done.delete(item.name):done.add(item.name);localStorage.setItem(STORAGE_KEY,JSON.stringify([...done]));render();return}let t='';if(a==='prompt')t=item.prompt;else if(a==='spec')t=buildProductSpec(item);else if(a==='bundle')t=buildFullBundle(item);try{await navigator.clipboard.writeText(t);btn.textContent='✓';btn.classList.add('copied');done.add(item.name);localStorage.setItem(STORAGE_KEY,JSON.stringify([...done]));setTimeout(()=>render(),600)}catch(e){alert('Copy failed')}}});
return card}
function render(){contentEl.innerHTML='';let vc=0;CATS.forEach(cat=>{if(activeFilter!=='All'&&activeFilter!==cat)return;const ci=ITEMS.filter(i=>i.category===cat),fi=ci.filter(matchesSearch);if(!fi.length)return;vc+=fi.length;const s=document.createElement('section');s.className='cat-section';s.innerHTML='<div class="cat-header"><div class="cat-dot" style="background:'+(catColor[cat]||'#888')+'"></div><div class="cat-title">'+cat+'</div><div class="cat-count">'+fi.length+'/'+ci.length+'</div></div><div class="grid"></div>';const g=s.querySelector('.grid');fi.forEach(it=>g.appendChild(makeCard(it)));contentEl.appendChild(s)});if(!vc)contentEl.innerHTML='<div class="no-results">Geen resultaten.</div>';updateStats()}
function updateStats(){document.getElementById('totalCount').textContent=ITEMS.length;document.getElementById('catCount').textContent=CATS.length;document.getElementById('doneCount').textContent=done.size;document.getElementById('progressText').textContent=done.size+'/'+ITEMS.length;document.getElementById('progressFill').style.width=(ITEMS.length?(done.size/ITEMS.length*100):0)+'%'}
document.getElementById('search').oninput=e=>{searchTerm=e.target.value;render()};
document.getElementById('resetDone').onclick=()=>{if(confirm('Wis alle progress?')){done.clear();localStorage.removeItem(STORAGE_KEY);render()}};
document.getElementById('expandAll').onclick=()=>{allExpanded=!allExpanded;document.getElementById('expandAll').textContent=allExpanded?'Inklappen':'Uitklappen';expandedCards.clear();render()};
fetch('sports-bar-data.json').then(r=>r.json()).then(d=>{ITEMS=d;ITEMS.forEach(i=>{catColor[i.category]=i.color});render()}).catch(()=>{contentEl.innerHTML='<div class="no-results">Data laden mislukt.</div>'});
</script>
</body>
</html>
